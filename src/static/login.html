<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — AI Form Checker</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1117;
      --panel: #1a1d27;
      --card: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --purple: #7c3aed;
      --red: #ef4444;
      --muted: #8892b0;
      --text: #e2e8f0;
      --radius: 8px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
    }

    .login-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .login-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }

    .login-header .ai-badge {
      background: linear-gradient(90deg, var(--purple), var(--accent));
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: .05em;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
    }

    .field input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }

    .field input:focus {
      border-color: var(--accent);
    }

    .error-msg {
      color: var(--red);
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      border-radius: var(--radius);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: opacity .15s;
    }

    .btn-login:hover {
      opacity: .9;
    }

    .btn-login:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="login-card">
    <div class="login-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        style="color:var(--accent)">
        <path d="M12 2a10 10 0 1 0 10 10" />
        <path d="M12 6v6l4 2" />
        <path d="M18 2v4h4" />
      </svg>
      <h1>AI Form Checker</h1>
      <span class="ai-badge">AUTH</span>
    </div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="field">
        <label for="login">Логин</label>
        <input type="text" id="login" name="login" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button class="btn-login" type="submit" id="submitBtn">Войти</button>
    </form>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Вход...';

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            login: document.getElementById('login').value,
            password: document.getElementById('password').value,
          }),
        });
        const data = await resp.json();
        if (data.ok) {
          localStorage.setItem('token', data.token);
          window.location.href = '/';
        } else {
          errEl.textContent = data.error || 'Ошибка входа';
          errEl.style.display = 'block';
        }
      } catch (err) {
        errEl.textContent = 'Ошибка подключения к серверу';
        errEl.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  </script>
</body>

</html>
